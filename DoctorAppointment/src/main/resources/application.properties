# Active Profile
spring.profiles.active=dev

# Application Name
spring.application.name=DoctorAppointment

# Server configuration
server.port=8081

# Spring JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Swagger / OpenAPI documentation path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration Security Constants
hospital.jwt.secret=9a6747fc6259aa374ab4e1bb57a7445a557dabbcd6cf04a8b790d1fcfbd6e8b4e4df9df1593c6f2a690dcbe2d88d22c543c7b2e95a97dd50085a5391d31fa05c
hospital.jwt.expiration-ms=86400000

